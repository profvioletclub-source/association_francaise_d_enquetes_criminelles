<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon compte</title>

  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <!-- Ton script qui initialise Firebase -->
  <script src="connexion.js"></script>
</head>
<body>

  <h1>Mon compte</h1>

  <div id="status">Chargement...</div>

  <p><strong>Nom :</strong> <span id="lastName"></span></p>
  <p><strong>Prénom :</strong> <span id="firstName"></span></p>
  <p><strong>Deuxièmes prénoms :</strong> <span id="middleNames"></span></p>
  <p><strong>Date de naissance :</strong> <span id="birthDate"></span></p>
  <p><strong>Lieu de naissance :</strong> <span id="birthPlace"></span></p>

  <script>
    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        document.getElementById("status").textContent = "Vous devez être connecté.";
        return;
      }

      const ref = db.collection("users").doc(user.uid);
      const snap = await ref.get();

      if (!snap.exists) {
        document.getElementById("status").textContent = "Aucune donnée trouvée.";
        return;
      }

      const data = snap.data();
      document.getElementById("status").textContent = "Données chargées.";

      document.getElementById("firstName").textContent = data.firstName || "";
      document.getElementById("lastName").textContent = data.lastName || "";
      document.getElementById("middleNames").textContent = data.middleNames || "";
      document.getElementById("birthDate").textContent = data.birthDate || "";
      document.getElementById("birthPlace").textContent = data.birthPlace || "";
    });
  </script>

</body>
</html>
